<!-- Login partial — loaded into #app-content by the router -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/images/cyrus-logo.png" alt="Logo" onerror="this.style.display='none'"/>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to your account</p>

      <!-- Success Message -->
      <div class="alert alert-success mb-3 d-none" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i>
        <span id="success-message"></span>
      </div>

      <!-- Normal Login Form -->
      <div id="login-form">
        <form class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input 
              id="email" 
              type="email" 
              class="form-control" 
              placeholder="Enter your email"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input 
              id="password" 
              type="password" 
              class="form-control" 
              placeholder="Enter your password"
              autocomplete="current-password"
            />
          </div>

          <div class="form-footer">
            <a class="link-small" href="#" id="forgot-password-link">Forgot password?</a>
          </div>

          <div class="alert alert-warning d-none" role="alert">
            <span id="error-message"></span>
          </div>

          <button 
            type="button"
            class="btn btn-primary btn-full" 
            id="user-login-btn"
          >
            Sign In
            <i class="fa-solid fa-right-to-bracket ms-2"></i>
          </button>
        </form>
      </div>

      <!-- Subscription Renewal Form -->
      <div id="renewal-form" class="d-none">
        <div class="auth-form">
          <div class="alert alert-warning mb-3" role="alert">
            <i class="fa-solid fa-exclamation-triangle me-2"></i>
            <span id="renewal-message">Your subscription has expired. Please renew to continue.</span>
          </div>

          <div class="renewal-info mb-4">
            <p class="text-muted mb-3">Choose a plan to renew your subscription:</p>
            
            <div class="plan-selector mb-3">
              <div class="form-check mb-2">
                <input 
                  class="form-check-input" 
                  type="radio" 
                  name="planType" 
                  id="monthlyPlan"
                  value="monthly"
                  checked
                />
                <label class="form-check-label d-flex justify-content-between align-items-center" for="monthlyPlan">
                  <span>
                    <strong>Monthly Plan</strong>
                    <small class="d-block text-muted">Billed monthly</small>
                  </span>
                  <span class="badge bg-primary">$14/month</span>
                </label>
              </div>

              <div class="form-check">
                <input 
                  class="form-check-input" 
                  type="radio" 
                  name="planType" 
                  id="yearlyPlan"
                  value="yearly"
                />
                <label class="form-check-label d-flex justify-content-between align-items-center" for="yearlyPlan">
                  <span>
                    <strong>Yearly Plan</strong>
                    <small class="d-block text-muted">Billed annually</small>
                  </span>
                  <span class="badge bg-success">$140/year</span>
                </label>
              </div>
            </div>
          </div>

          <div class="alert alert-warning d-none" role="alert">
            <span id="renewal-error-message"></span>
          </div>

          <button 
            type="button"
            class="btn btn-primary btn-full mb-2" 
            id="renew-subscription-btn"
          >
            Renew Subscription
            <i class="fa-solid fa-credit-card ms-2"></i>
          </button>

          <button 
            type="button"
            class="btn btn-link btn-full" 
            id="cancel-renewal-btn"
          >
            Cancel
          </button>
        </div>
      </div>

      <div class="divider">
        <span>New to MonkeyMonie?</span>
      </div>

      <button class="btn btn-outline btn-full" id="create-account-btn">
        Create an Account
      </button>
    </div>
  </main>
