<!-- Create Account partial — loaded into #app-content by the router -->
  <main class="auth-container">
    <div class="auth-card wide">
      <div class="auth-logo">
        <img src="assets/images/cyrus-logo.png" alt="Logo" onerror="this.style.display='none'"/>
      </div>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle mb-2" style="color: white;">Set up your local Cyrus account</p>

      <div class="alert alert-info mb-3" role="alert">
        <i class="fa-solid fa-shield-halved me-2"></i>
        <strong>Your data stays private.</strong> All information is stored locally on your device only and never sent to any remote servers.
      </div>

      <div class="alert alert-success mb-3 d-none" role="alert" id="success-alert">
        <i class="fa-solid fa-circle-check me-2"></i>
        <span id="success-message"></span>
      </div>

      <form class="auth-form" onsubmit="return false;">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input 
            id="username" 
            type="text" 
            class="form-control" 
            placeholder="Choose a username"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            id="password" 
            type="password" 
            class="form-control" 
            placeholder="Create a password (min 6 characters)"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input 
            id="confirmPassword" 
            type="password" 
            class="form-control" 
            placeholder="Confirm your password"
            autocomplete="new-password"
          />
        </div>

        <small class="form-text text-muted mt-2 mb-2">
          <i class="fa-solid fa-info-circle"></i> You can add exchange API keys after creating your account in Settings.
        </small>

        <div class="alert alert-warning d-none" role="alert" id="error-alert">
          <span id="error-message"></span>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-outline btn-full mb-2" id="back-to-login-btn">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Back to Sign In
          </button>

          <button 
            type="button"
            class="btn btn-primary btn-full" 
            id="create-account-btn"
          >
            <span id="btn-text">Create Account</span>
            <i class="fa-solid fa-user-plus ms-2"></i>
          </button>
        </div>
      </form>
    </div>
  </main>
